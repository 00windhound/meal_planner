<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Meal Planner</h1>

    <div class="homeButtons">
        <button id = "ingredientsButton"  onclick="window.location.href='front end/ingredients.html'">Ingredients</button>
        <button id = "recipesButton">Recipes</button>
        <button id = "priorityInfoButton">Priorities</button>
        <div id = "priorityDropDown">

        </div>

        <details>
            <summary>priorities</summary>

            <label><input type="checkbox" value = "price"> price</label><br>
            <label><input type="checkbox" value = "calories"> calories</label><br>
            <label><input type="checkbox" value = "protein"> protein</label><br>
            <label><input type="checkbox" value = "sodium"> sodium</label><br>
        </details>
        <button id="showTags">Show Selected</button>
    </div>

    

    <div id = weeklyMeals>
        <h2>Weekly Meals</h2>
        <ul id="weeklyMealList"></ul>
    </div>

    <div id = "missingInfo">
        <h4>Needs Information</h4>
    </div>


    <script src="script.js"></script>
</body>
</html>
