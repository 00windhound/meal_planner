<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Meal Planner</h1>
        <button id = "menuButton">Menu</button>
        <nav class="headerButtons">
            <button id = "ingredientsButton"  onclick="window.location.href='front end/ingredients.html'">Ingredients</button>
            <button id = "recipesButton">Recipes</button>
            <button id = "plannerButton">Planner</button>
            <details id="priorities">
                <summary>priorities</summary>
                <label><input type="checkbox" value = "price"> price</label><br>
                <label><input type="checkbox" value = "calories"> calories</label><br>
                <label><input type="checkbox" value = "protein"> protein</label><br>
                <label><input type="checkbox" value = "sodium"> sodium</label><br>
            </details>
            <details id="help">
                <summary>Help</summary>
                <p>This is a simple meal planner. You can add meals, ingredients, and set priorities.</p>
            </details>
            <button id="logOutButton">Log Out</button>
        </nav>
    </header>
    

    <div id = plannedMeals>
        <h2>Weekly Meals</h2>
        <ul id="weeklyMealList"></ul>
    </div>

    <div id = "shoppingList">
        <h2>Shopping List</h2>
        <ul id="shoppingListItems"></ul>
    </div>

    <div id = "missingInfo">
        <h2>Needs Information</h2>
        <ul id="missingInfoItems"></ul>
    </div>


    <script src="script.js"></script>
</body>
</html>
