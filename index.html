<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
        rel="stylesheet" crossorigin="anonymous"
   integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3">
</head>
<body>
    <header>
        <h1>Meal Planner</h1>
        <button id = "menuButton">Menu</button>
        <nav class="headerButtons">
            <button id="ingredientsButton"  onclick="window.location.href='front end/ingredients.html'">Ingredients</button>
            <button id="recipesButton" onclick="window.location.href='front end/recipies.html'">Recipes</button>
            <button id="plannerButton" onclick="window.location.href='front end/planner.html'">Planner</button>
            <button id="prioritiesButton">priorities</button>  
            <button id="helpButton">Help</button>         
            <button id="logOutButton">Log Out</button>
        </nav>
    </header>
    <form id="mealForm">
        <h4>Set Priorities</h4>
        <input type="checkbox" value="price" id="priceCheckbox"> Price<br>
        <input type="checkbox" value="calories" id="caloriesCheckbox"> Calories<br>
        <input type="checkbox" value="protein" id="proteinCheckbox"> Protein<br>
    </form>

    <div id="helpwindow">
        <p>This is a simple meal planner. You can add meals, ingredients, and set priorities.
    </div>

    <div id = plannedMeals>
        <h2>Weekly Meals</h2>
        <ul id="weeklyMealList"></ul>
    </div>

    <div id = "shoppingList">
        <h2>Shopping List</h2>
        <ul id="shoppingListItems"></ul>
    </div>

    <div id = "missingInfo">
        <h2>Needs Information</h2>
        <ul id="missingInfoItems"></ul>
    </div>


    <script src="script.js"></script>
</body>
</html>
