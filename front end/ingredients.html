<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ingredients</h1>
    <button id = "addIngredientButton">Add Ingredient</button>
    <div id="ingredientForm">
        <input type="text" id="ingredientName" placeholder="Ingredient Name">
        <input type="number" id="price" placeholder="Price">
        <input type="number" id="calories" placeholder="Calories">
        <button id="saveIngredientButton">Save</button>
    </div>
    <ul id="ingredientList"></ul>
    

    <script src="script.js"></script>
</body>
</html>
